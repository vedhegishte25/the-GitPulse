<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git_Board — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0d0d0f;
    --bg-secondary: #13131a;
    --bg-card: #1a1a24;
    --bg-card-hover: #1f1f2e;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(139,92,246,0.4);
    --text-primary: #f0f0f5;
    --text-secondary: #8b8b9e;
    --text-muted: #55556a;
    --accent: #8b5cf6;
    --accent-soft: rgba(139,92,246,0.08);
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
  }
  [data-theme="light"] {
    --bg-primary: #f8f8fc;
    --bg-secondary: #f0f0f8;
    --bg-card: #ffffff;
    --bg-card-hover: #f5f5ff;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(139,92,246,0.4);
    --text-primary: #0d0d1a;
    --text-secondary: #5a5a7a;
    --text-muted: #9090aa;
    --accent: #7c3aed;
    --accent-soft: rgba(124,58,237,0.06);
    --green: #059669;
    --red: #dc2626;
    --blue: #2563eb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(13,13,15,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    transition: background 0.3s;
  }
  [data-theme="light"] nav { background: rgba(248,248,252,0.88); }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-icon {
    width: 30px; height: 30px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 15px;
  }
  .nav-logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .nav-logo-text span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .theme-btn {
    width: 36px; height: 36px; border-radius: 8px;
    border: 0.5px solid var(--border);
    background: var(--bg-card); color: var(--text-secondary);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-btn:hover { border-color: var(--border-hover); }
  .back-btn {
    padding: 8px 16px; border-radius: 8px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer; font-size: 13px;
    transition: all 0.2s; text-decoration: none;
    display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }

  /* MAIN */
  main { padding: 80px 32px 48px; max-width: 1200px; margin: 0 auto; }

  /* REPO HEADER */
  .repo-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; flex-wrap: wrap;
    gap: 20px; margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 0.5px solid var(--border);
  }
  .repo-title-wrap { display: flex; flex-direction: column; gap: 8px; }
  .repo-owner { font-size: 13px; color: var(--text-muted); }
  .repo-name {
    font-size: 28px; font-weight: 800;
    color: var(--text-primary); letter-spacing: -0.5px;
  }
  .repo-desc { font-size: 14px; color: var(--text-secondary); max-width: 500px; line-height: 1.6; }
  .repo-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .meta-badge {
    padding: 4px 10px; border-radius: 99px;
    background: var(--accent-soft);
    border: 0.5px solid rgba(139,92,246,0.15);
    font-size: 12px; color: var(--accent); font-weight: 500;
  }
  .repo-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .repo-stat { text-align: right; }
  .repo-stat-num { font-size: 22px; font-weight: 800; color: var(--text-primary); }
  .repo-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* GRID */
  .grid-2 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
    gap: 16px; margin-bottom: 16px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px; margin-bottom: 16px;
  }
  .grid-4 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin-bottom: 16px;
  }

  /* CARD */
  .card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 24px;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 20px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* STAT CARDS */
  .stat-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .stat-card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-card-val { font-size: 28px; font-weight: 800; color: var(--text-primary); }
  .stat-card-sub { font-size: 12px; color: var(--green); margin-top: 5px; }
  .stat-card-sub.red { color: var(--red); }

  /* CHART CANVAS */
  .chart-wrap { position: relative; height: 240px; }

  /* LEADERBOARD */
  .leader-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .leader-item:last-child { border-bottom: none; }
  .leader-rank {
    font-size: 12px; font-weight: 700;
    color: var(--text-muted); width: 20px; text-align: center;
  }
  .leader-avatar {
    width: 32px; height: 32px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
  }
  .leader-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .leader-info { flex: 1; }
  .leader-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .leader-bar-wrap {
    height: 4px; background: var(--border);
    border-radius: 99px; margin-top: 5px; overflow: hidden;
  }
  .leader-bar { height: 100%; background: var(--accent); border-radius: 99px; }
  .leader-count { font-size: 12px; color: var(--text-muted); font-weight: 600; }

  /* LANGUAGE LIST */
  .lang-item {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .lang-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lang-name { font-size: 13px; color: var(--text-primary); flex: 1; }
  .lang-pct { font-size: 12px; color: var(--text-muted); font-weight: 600; }

  /* LOADING */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--text-muted); font-size: 13px; gap: 8px;
  }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-msg {
    text-align: center; padding: 40px;
    color: var(--red); font-size: 14px;
  }

  /* FLOATING PROFILE */
  #profile-bubble {
    position: fixed; bottom: 16px; right: 16px; z-index: 200;
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 99px; padding: 4px 8px 4px 4px;
    opacity: 0.4; transition: opacity 0.2s;
    cursor: pointer; text-decoration: none;
  }
  #profile-bubble:hover { opacity: 1; }
  .p-avatar { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; position: relative; flex-shrink: 0; }
  .p-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .p-gh {
    position: absolute; bottom: -1px; right: -2px;
    width: 10px; height: 10px;
    background: var(--bg-card); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .p-name { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">⬡</div>
    <div class="nav-logo-text">Git<span>_Board</span></div>
  </a>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
    <a class="back-btn" href="index.html">← Back</a>
  </div>
</nav>

<!-- MAIN -->
<main>

  <!-- REPO HEADER -->
  <div class="repo-header" id="repoHeader">
    <div class="loading"><div class="spinner"></div> Loading repository...</div>
  </div>

  <!-- STAT CARDS -->
  <div class="grid-4" id="statCards">
    <div class="stat-card"><div class="stat-card-label">Stars</div><div class="stat-card-val" id="statStars">—</div></div>
    <div class="stat-card"><div class="stat-card-label">Forks</div><div class="stat-card-val" id="statForks">—</div></div>
    <div class="stat-card"><div class="stat-card-label">Open Issues</div><div class="stat-card-val" id="statIssues">—</div></div>
    <div class="stat-card"><div class="stat-card-label">Watchers</div><div class="stat-card-val" id="statWatchers">—</div></div>
  </div>

  <!-- CHARTS ROW 1 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Commit Activity — Last 12 Months</div>
      <div class="chart-wrap"><canvas id="commitChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Language Breakdown</div>
      <div style="display:flex; gap:24px; align-items:center;">
        <div style="width:160px; height:160px; flex-shrink:0;">
          <canvas id="langChart"></canvas>
        </div>
        <div style="flex:1;" id="langList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- CHARTS ROW 2 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Top Contributors</div>
      <div id="leaderboard">
        <div class="loading"><div class="spinner"></div> Loading...</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Code Frequency — Additions vs Deletions</div>
      <div class="chart-wrap"><canvas id="freqChart"></canvas></div>
    </div>
  </div>

  <!-- BUS FACTOR -->
  <div class="grid-3">
    <div class="card" id="busFactorCard">
      <div class="card-title">Bus Factor</div>
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="card" id="issuesCard">
      <div class="card-title">Issues Summary</div>
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="card" id="repoInfoCard">
      <div class="card-title">Repository Info</div>
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

</main>

<!-- FLOATING PROFILE BUBBLE -->
<a id="profile-bubble" href="https://github.com/vedhegishte25" target="_blank" title="vedhegishte25 on GitHub">
  <img class="p-avatar-img" src="https://github.com/vedhegishte25.png" alt="vedhegishte25">
  <div class="p-gh-overlay">
    <svg width="10" height="10" viewBox="0 0 16 16" fill="white">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
  </div>
</a>

<script>
  const API = 'http://127.0.0.1:8000';
  const LANG_COLORS = ['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4'];

  // Get owner/repo from URL params
  const params = new URLSearchParams(window.location.search);
  const owner = params.get('owner') || 'facebook';
  const repo = params.get('repo') || 'react';

  // Theme
  let dark = true;
  document.getElementById('themeBtn').addEventListener('click', () => {
    dark = !dark;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
  });

  function fmt(n) {
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return n;
  }

  // Load repo info
  async function loadRepo() {
    try {
      const res = await fetch(`${API}/repos/${owner}/${repo}`);
      const d = await res.json();
      document.getElementById('repoHeader').innerHTML = `
        <div class="repo-title-wrap">
          <div class="repo-owner">${d.full_name.split('/')[0]}</div>
          <div class="repo-name">${d.name}</div>
          <div class="repo-desc">${d.description || 'No description'}</div>
          <div class="repo-meta">
            ${d.language ? `<span class="meta-badge">${d.language}</span>` : ''}
            <span class="meta-badge">${d.private ? '🔒 Private' : '🌐 Public'}</span>
            <span class="meta-badge">Branch: ${d.default_branch}</span>
          </div>
        </div>
        <div class="repo-stats">
          <div class="repo-stat"><div class="repo-stat-num">${fmt(d.stars)}</div><div class="repo-stat-label">Stars</div></div>
          <div class="repo-stat"><div class="repo-stat-num">${fmt(d.forks)}</div><div class="repo-stat-label">Forks</div></div>
          <div class="repo-stat"><div class="repo-stat-num">${fmt(d.watchers)}</div><div class="repo-stat-label">Watchers</div></div>
        </div>
      `;
      document.getElementById('statStars').textContent = fmt(d.stars);
      document.getElementById('statForks').textContent = fmt(d.forks);
      document.getElementById('statIssues').textContent = fmt(d.open_issues);
      document.getElementById('statWatchers').textContent = fmt(d.watchers);

      // Repo info card
      document.getElementById('repoInfoCard').innerHTML = `
        <div class="card-title">Repository Info</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;">
            <span style="color:var(--text-muted)">Created</span>
            <span style="color:var(--text-primary)">${new Date(d.created_at).toLocaleDateString()}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:13px;">
            <span style="color:var(--text-muted)">Last Updated</span>
            <span style="color:var(--text-primary)">${new Date(d.updated_at).toLocaleDateString()}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:13px;">
            <span style="color:var(--text-muted)">Default Branch</span>
            <span style="color:var(--text-primary)">${d.default_branch}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:13px;">
            <span style="color:var(--text-muted)">Homepage</span>
            <span style="color:var(--accent)">${d.homepage ? `<a href="${d.homepage}" target="_blank" style="color:var(--accent);text-decoration:none;">${d.homepage}</a>` : '—'}</span>
          </div>
        </div>
      `;
    } catch(e) {
      document.getElementById('repoHeader').innerHTML = `<div class="error-msg">Failed to load repository. Make sure the backend is running.</div>`;
    }
  }

  // Commit activity chart
  async function loadCommits() {
    try {
      const res = await fetch(`${API}/repos/${owner}/${repo}/commit-activity`);
      const data = await res.json();
      const labels = data.map((_, i) => `W${i + 1}`);
      const values = data.map(w => w.total);
      new Chart(document.getElementById('commitChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: 'rgba(139,92,246,0.6)',
            borderColor: '#8b5cf6',
            borderWidth: 1,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { display: false },
            y: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#55556a', font: { size: 11 } }
            }
          }
        }
      });
    } catch(e) {}
  }

  // Language chart
  async function loadLanguages() {
    try {
      const res = await fetch(`${API}/repos/${owner}/${repo}/languages`);
      const data = await res.json();
      const top = data.slice(0, 7);
      new Chart(document.getElementById('langChart'), {
        type: 'doughnut',
        data: {
          labels: top.map(l => l.language),
          datasets: [{
            data: top.map(l => l.percentage),
            backgroundColor: LANG_COLORS,
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '70%',
          plugins: { legend: { display: false } }
        }
      });
      document.getElementById('langList').innerHTML = top.map((l, i) => `
        <div class="lang-item">
          <div class="lang-dot" style="background:${LANG_COLORS[i]}"></div>
          <div class="lang-name">${l.language}</div>
          <div class="lang-pct">${l.percentage}%</div>
        </div>
      `).join('');
    } catch(e) {}
  }

  // Contributors leaderboard
  async function loadLeaderboard() {
    try {
      const res = await fetch(`${API}/contributors/${owner}/${repo}/leaderboard`);
      const data = await res.json();
      const max = data.leaderboard[0]?.contributions || 1;
      document.getElementById('leaderboard').innerHTML = data.leaderboard.map(c => `
        <div class="leader-item">
          <div class="leader-rank">${c.rank}</div>
          <div class="leader-avatar"><img src="${c.avatar}" alt="${c.username}"></div>
          <div class="leader-info">
            <div class="leader-name">${c.username}</div>
            <div class="leader-bar-wrap">
              <div class="leader-bar" style="width:${(c.contributions/max*100).toFixed(1)}%"></div>
            </div>
          </div>
          <div class="leader-count">${c.contributions}</div>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('leaderboard').innerHTML = `<div class="error-msg">Failed to load</div>`;
    }
  }

  // Code frequency chart
  async function loadCodeFrequency() {
    try {
      const res = await fetch(`${API}/repos/${owner}/${repo}/code-frequency`);
      const data = await res.json();
      const recent = data.slice(-24);
      const labels = recent.map((_, i) => `W${i + 1}`);
      new Chart(document.getElementById('freqChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Additions',
              data: recent.map(w => w.additions),
              borderColor: '#10b981',
              backgroundColor: 'rgba(16,185,129,0.08)',
              borderWidth: 1.5,
              fill: true, tension: 0.4, pointRadius: 0,
            },
            {
              label: 'Deletions',
              data: recent.map(w => Math.abs(w.deletions)),
              borderColor: '#ef4444',
              backgroundColor: 'rgba(239,68,68,0.08)',
              borderWidth: 1.5,
              fill: true, tension: 0.4, pointRadius: 0,
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: '#8b8b9e', font: { size: 11 }, boxWidth: 12 }
            }
          },
          scales: {
            x: { display: false },
            y: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#55556a', font: { size: 11 } }
            }
          }
        }
      });
    } catch(e) {}
  }

  // Bus factor
  async function loadBusFactor() {
    try {
      const res = await fetch(`${API}/contributors/${owner}/${repo}/bus-factor`);
      const d = await res.json();
      document.getElementById('busFactorCard').innerHTML = `
        <div class="card-title">Bus Factor</div>
        <div style="text-align:center;padding:16px 0;">
          <div style="font-size:52px;font-weight:800;color:var(--text-primary)">${d.bus_factor}</div>
          <div style="font-size:14px;color:var(--text-secondary);margin:8px 0">${d.risk_level}</div>
          <div style="font-size:12px;color:var(--text-muted)">${d.explanation}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:4px">out of ${d.total_contributors} total contributors</div>
        </div>
      `;
    } catch(e) {}
  }

  // Issues summary
  async function loadIssues() {
    try {
      const res = await fetch(`${API}/issues/${owner}/${repo}`);
      const d = await res.json();
      document.getElementById('issuesCard').innerHTML = `
        <div class="card-title">Issues Summary</div>
        <div style="display:flex;flex-direction:column;gap:14px;margin-top:4px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Total Fetched</span>
            <span style="font-size:18px;font-weight:700;color:var(--text-primary)">${d.total}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Open</span>
            <span style="font-size:18px;font-weight:700;color:var(--red)">${d.open}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Closed</span>
            <span style="font-size:18px;font-weight:700;color:var(--green)">${d.closed}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Close Rate</span>
            <span style="font-size:18px;font-weight:700;color:var(--accent)">${d.close_rate}%</span>
          </div>
        </div>
      `;
    } catch(e) {}
  }

  // Init
  loadRepo();
  loadCommits();
  loadLanguages();
  loadLeaderboard();
  loadCodeFrequency();
  loadBusFactor();
  loadIssues();
</script>
</body>
</html>
