<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitPulse — Issues & PRs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0d0d0f;
    --bg-secondary: #13131a;
    --bg-card: #1a1a24;
    --bg-card-hover: #1f1f2e;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(139,92,246,0.4);
    --text-primary: #f0f0f5;
    --text-secondary: #8b8b9e;
    --text-muted: #55556a;
    --accent: #8b5cf6;
    --accent-soft: rgba(139,92,246,0.08);
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
  }
  [data-theme="light"] {
    --bg-primary: #f8f8fc;
    --bg-secondary: #f0f0f8;
    --bg-card: #ffffff;
    --bg-card-hover: #f5f5ff;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(139,92,246,0.4);
    --text-primary: #0d0d1a;
    --text-secondary: #5a5a7a;
    --text-muted: #9090aa;
    --accent: #7c3aed;
    --accent-soft: rgba(124,58,237,0.06);
    --green: #059669;
    --red: #dc2626;
    --yellow: #d97706;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(13,13,15,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    transition: background 0.3s;
  }
  [data-theme="light"] nav { background: rgba(248,248,252,0.88); }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-icon {
    width: 30px; height: 30px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 15px;
  }
  .nav-logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .nav-logo-text span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .theme-btn {
    width: 36px; height: 36px; border-radius: 8px;
    border: 0.5px solid var(--border);
    background: var(--bg-card); color: var(--text-secondary);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-btn:hover { border-color: var(--border-hover); }
  .back-btn {
    padding: 8px 16px; border-radius: 8px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer; font-size: 13px;
    transition: all 0.2s; text-decoration: none;
    display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .nav-link {
  padding: 8px 14px; border-radius: 8px;
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 500;
  text-decoration: none;
  transition: all 0.2s;
}
.nav-link:hover { border-color: var(--border-hover); color: var(--text-primary); }

  /* MAIN */
  main { padding: 80px 32px 48px; max-width: 1200px; margin: 0 auto; }

  /* PAGE HEADER */
  .page-header {
    margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 0.5px solid var(--border);
  }
  .page-tag {
    font-size: 11px; font-weight: 700; color: var(--accent);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;
  }
  .page-title {
    font-size: 28px; font-weight: 800;
    color: var(--text-primary); letter-spacing: -0.5px; margin-bottom: 6px;
  }
  .page-sub { font-size: 14px; color: var(--text-secondary); }

  /* GRIDS */
  .grid-2 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
    gap: 16px; margin-bottom: 16px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px; margin-bottom: 16px;
  }
  .grid-4 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin-bottom: 16px;
  }

  /* CARD */
  .card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 24px;
    margin-bottom: 0;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 20px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* STAT CARDS */
  .stat-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-val { font-size: 28px; font-weight: 800; color: var(--text-primary); }
  .stat-sub { font-size: 12px; margin-top: 5px; }

  /* CHART */
  .chart-wrap { position: relative; height: 240px; }

  /* ISSUES LIST */
  .issue-item {
    padding: 14px 0;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .issue-item:last-child { border-bottom: none; }
  .issue-state {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
  }
  .issue-state.open { background: var(--green); }
  .issue-state.closed { background: var(--red); }
  .issue-info { flex: 1; min-width: 0; }
  .issue-title {
    font-size: 13px; font-weight: 500;
    color: var(--text-primary); margin-bottom: 5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .issue-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .issue-labels { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .issue-label {
    padding: 2px 7px; border-radius: 99px;
    font-size: 10px; font-weight: 600;
    background: var(--accent-soft);
    border: 0.5px solid rgba(139,92,246,0.15);
    color: var(--accent);
  }
  .issue-num { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

  /* PR LIST */
  .pr-item {
    padding: 14px 0;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .pr-item:last-child { border-bottom: none; }
  .pr-state {
    padding: 2px 8px; border-radius: 99px;
    font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .pr-state.open { background: rgba(16,185,129,0.12); color: var(--green); }
  .pr-state.closed { background: rgba(239,68,68,0.1); color: var(--red); }
  .pr-info { flex: 1; min-width: 0; }
  .pr-title {
    font-size: 13px; font-weight: 500;
    color: var(--text-primary); margin-bottom: 5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pr-meta { font-size: 11px; color: var(--text-muted); }

  /* LABELS CHART */
  .label-item {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .label-name { font-size: 13px; color: var(--text-primary); flex: 1; }
  .label-bar-wrap {
    width: 120px; height: 4px;
    background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .label-bar { height: 100%; background: var(--accent); border-radius: 99px; }
  .label-count { font-size: 12px; color: var(--text-muted); width: 28px; text-align: right; }

  /* STALE */
  .stale-item {
    padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .stale-item:last-child { border-bottom: none; }
  .stale-age {
    padding: 3px 8px; border-radius: 6px;
    background: rgba(245,158,11,0.1);
    color: var(--yellow);
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .stale-title {
    font-size: 13px; color: var(--text-primary); flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .stale-author { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

  /* TABS */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    background: var(--bg-secondary);
    border-radius: 10px; padding: 4px;
  }
  .tab {
    padding: 7px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: none;
    background: transparent; color: var(--text-muted);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 0.5px solid var(--border);
  }

  /* LOADING */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 160px; color: var(--text-muted); font-size: 13px; gap: 8px;
  }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FLOATING PROFILE */
  #profile-bubble {
  position: fixed; bottom: 18px; right: 18px; z-index: 200;
  width: 36px; height: 36px; border-radius: 50%;
  background: #1a1a24;
  border: 1.5px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  opacity: 0.5; transition: opacity 0.2s, transform 0.2s;
}
#profile-bubble:hover { opacity: 1; transform: scale(1.08); }
.p-avatar-img {
  width: 38px; height: 38px; border-radius: 50%;
  object-fit: cover; display: block;
  border: 2px solid var(--border);
}
.p-gh-overlay {
  position: absolute; bottom: 0; right: 0;
  width: 16px; height: 16px; border-radius: 50%;
  background: #1a1a24;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--bg-primary);
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">⬡</div>
    <div class="nav-logo-text">Git<span>Pulse</span></div>
  </a>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
    <a class="nav-link" id="navDashboard" href="#">Dashboard</a>
    <a class="nav-link" id="navContributors" href="#">Contributors</a>
    <a class="back-btn" href="index.html">← Home</a>
  </div>
</nav>

<!-- MAIN -->
<main>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-tag">Issues & Pull Requests</div>
    <div class="page-title" id="pageTitle">Loading...</div>
    <div class="page-sub" id="pageSub">Fetching issues and PR data...</div>
  </div>

  <!-- STAT CARDS -->
  <div class="grid-4">
    <div class="stat-card">
      <div class="stat-label">Total Issues</div>
      <div class="stat-val" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Open Issues</div>
      <div class="stat-val" id="statOpen" style="color:var(--red)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Closed Issues</div>
      <div class="stat-val" id="statClosed" style="color:var(--green)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Close Rate</div>
      <div class="stat-val" id="statRate" style="color:var(--accent)">—</div>
      <div class="stat-sub" style="color:var(--text-muted)">of fetched issues</div>
    </div>
  </div>

  <!-- CHARTS ROW -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Issues — Open vs Closed</div>
      <div class="chart-wrap"><canvas id="issueDonut"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">PR Summary</div>
      <div id="prSummary">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- ISSUES LIST + LABELS -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Recent Issues</div>
      <div class="tabs">
        <button class="tab active" onclick="filterIssues('all', this)">All</button>
        <button class="tab" onclick="filterIssues('open', this)">Open</button>
        <button class="tab" onclick="filterIssues('closed', this)">Closed</button>
      </div>
      <div id="issuesList" style="max-height:360px;overflow-y:auto;">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Label Distribution</div>
      <div id="labelsList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- PULL REQUESTS + STALE -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Recent Pull Requests</div>
      <div id="prList" style="max-height:360px;overflow-y:auto;">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Stale Issues (30+ days)</div>
      <div id="staleList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</main>

<!-- FLOATING PROFILE BUBBLE -->
<a id="profile-bubble" href="https://github.com/vedhegishte25" target="_blank" title="vedhegishte25 on GitHub">
  <svg viewBox="0 0 16 16" fill="white" width="20" height="20">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
  </svg>
</a>

<script>
  const API = 'http://127.0.0.1:8000';
  const params = new URLSearchParams(window.location.search);
  const owner = params.get('owner') || 'facebook';
  const repo = params.get('repo') || 'react';

  let allIssues = [];

  // Theme
  let dark = true;
  document.getElementById('themeBtn').addEventListener('click', () => {
    dark = !dark;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
  });

  document.getElementById('pageTitle').textContent = `${owner}/${repo}`;
  document.getElementById('pageSub').textContent = `Issues and PR analytics for ${owner}/${repo}`;

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
    if (diff === 0) return 'today';
    if (diff === 1) return '1 day ago';
    if (diff < 30) return `${diff} days ago`;
    if (diff < 365) return `${Math.floor(diff/30)}mo ago`;
    return `${Math.floor(diff/365)}y ago`;
  }

  function renderIssues(issues) {
    if (!issues.length) {
      document.getElementById('issuesList').innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px;">No issues found</div>`;
      return;
    }
    document.getElementById('issuesList').innerHTML = issues.slice(0, 30).map(i => `
      <div class="issue-item">
        <div class="issue-state ${i.state}"></div>
        <div class="issue-info">
          <div class="issue-title">${i.title}</div>
          <div class="issue-meta">
            <span>#${i.id}</span>
            <span>by ${i.author}</span>
            <span>${timeAgo(i.created_at)}</span>
            <span>💬 ${i.comments}</span>
          </div>
          ${i.labels.length ? `<div class="issue-labels">${i.labels.map(l => `<span class="issue-label">${l}</span>`).join('')}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  function filterIssues(state, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    if (state === 'all') renderIssues(allIssues);
    else renderIssues(allIssues.filter(i => i.state === state));
  }

  // Load issues
  async function loadIssues() {
    try {
      const res = await fetch(`${API}/issues/${owner}/${repo}?state=all`);
      const data = await res.json();
      allIssues = data.issues;

      document.getElementById('statTotal').textContent = data.total;
      document.getElementById('statOpen').textContent = data.open;
      document.getElementById('statClosed').textContent = data.closed;
      document.getElementById('statRate').textContent = data.close_rate + '%';

      renderIssues(allIssues);

      // Donut chart
      new Chart(document.getElementById('issueDonut'), {
        type: 'doughnut',
        data: {
          labels: ['Open', 'Closed'],
          datasets: [{
            data: [data.open, data.closed],
            backgroundColor: ['#ef4444', '#10b981'],
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '65%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#8b8b9e', font: { size: 12 }, padding: 16, boxWidth: 10 }
            }
          }
        }
      });
    } catch(e) {
      document.getElementById('issuesList').innerHTML = `<div style="color:var(--red);text-align:center;padding:20px;font-size:13px;">Failed to load issues</div>`;
    }
  }

  // Load PRs
  async function loadPRs() {
    try {
      const res = await fetch(`${API}/issues/${owner}/${repo}/pulls`);
      const data = await res.json();

      document.getElementById('prSummary').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Total PRs</span>
            <span style="font-size:20px;font-weight:800;color:var(--text-primary)">${data.total}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Open</span>
            <span style="font-size:20px;font-weight:800;color:var(--green)">${data.open}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Closed</span>
            <span style="font-size:20px;font-weight:800;color:var(--red)">${data.closed}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Merged</span>
            <span style="font-size:20px;font-weight:800;color:var(--accent)">${data.merged}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:var(--text-muted)">Merge Rate</span>
            <span style="font-size:20px;font-weight:800;color:var(--accent)">${data.merge_rate}%</span>
          </div>
        </div>
      `;

      document.getElementById('prList').innerHTML = data.pull_requests.slice(0, 20).map(pr => `
        <div class="pr-item">
          <span class="pr-state ${pr.state}">${pr.state}</span>
          <div class="pr-info">
            <div class="pr-title">${pr.title}</div>
            <div class="pr-meta">#${pr.id} · by ${pr.author} · ${timeAgo(pr.created_at)}</div>
          </div>
        </div>
      `).join('');
    } catch(e) {}
  }

  // Load labels
  async function loadLabels() {
    try {
      const res = await fetch(`${API}/issues/${owner}/${repo}/labels`);
      const data = await res.json();
      if (!data.labels.length) {
        document.getElementById('labelsList').innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px;">No labels found</div>`;
        return;
      }
      const max = data.labels[0].count;
      document.getElementById('labelsList').innerHTML = `
        <div style="max-height:360px;overflow-y:auto;">
          ${data.labels.slice(0, 20).map(l => `
            <div class="label-item">
              <div class="label-name">${l.label}</div>
              <div class="label-bar-wrap">
                <div class="label-bar" style="width:${(l.count/max*100).toFixed(1)}%"></div>
              </div>
              <div class="label-count">${l.count}</div>
            </div>
          `).join('')}
        </div>
      `;
    } catch(e) {}
  }

  // Load stale issues
  async function loadStale() {
    try {
      const res = await fetch(`${API}/issues/${owner}/${repo}/stale?days=30`);
      const data = await res.json();
      if (!data.stale_issues.length) {
        document.getElementById('staleList').innerHTML = `
          <div style="text-align:center;padding:40px;">
            <div style="font-size:28px;margin-bottom:10px;">✅</div>
            <div style="font-size:13px;color:var(--green);font-weight:600;">No stale issues!</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">All open issues are under 30 days old</div>
          </div>
        `;
        return;
      }
      document.getElementById('staleList').innerHTML = `
        <div style="max-height:360px;overflow-y:auto;">
          ${data.stale_issues.map(i => `
            <div class="stale-item">
              <span class="stale-age">${i.age_days}d</span>
              <span class="stale-title">${i.title}</span>
              <span class="stale-author">${i.author}</span>
            </div>
          `).join('')}
        </div>
      `;
    } catch(e) {}
  }

  // Init
  loadIssues();
  loadPRs();
  loadLabels();
  loadStale();
  // Connect nav links
document.getElementById('navDashboard').href = `dashboard.html?owner=${owner}&repo=${repo}`;
document.getElementById('navContributors').href = `contributors.html?owner=${owner}&repo=${repo}`;
</script>
</body>
</html>
